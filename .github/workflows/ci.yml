name: Web CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Type check & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://cloudlink-agents-production.up.railway.app"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

  notify-deploy:
    name: Notify Cloudlink of deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Send deploy event
        run: |
          curl -sf -X POST "${{ secrets.CLOUDLINK_API_URL }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.CLOUDLINK_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "cloudlinkglobal-web",
              "version": "${{ github.sha }}",
              "environment": "production",
              "commit_message": ${{ toJSON(github.event.head_commit.message) }}
            }' || echo "Deploy notification failed (non-fatal)"
